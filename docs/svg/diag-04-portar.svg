<svg width="940" height="276" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,'Segoe UI',sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#78909c"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#00000018"/>
    </filter>
  </defs>

  <rect width="940" height="276" rx="10" fill="#f1f3f4"/>
  <rect width="940" height="30" rx="10" fill="#263238"/>
  <rect y="20" width="940" height="10" fill="#263238"/>
  <text x="470" y="19" text-anchor="middle" font-size="11" font-weight="700" fill="white">Portar la receta a un dominio nuevo — checklist (6 pasos)</text>

  <!-- Paso 1 · Definir topics (prep) -->
  <rect x="28" y="72" width="134" height="118" rx="9" fill="#eceff1" stroke="#90a4ae" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="28" y="72" width="134" height="24" rx="9" fill="#546e7a"/>
  <rect x="28" y="84" width="134" height="12" fill="#546e7a"/>
  <text x="95" y="89" text-anchor="middle" font-size="8" font-weight="700" fill="white">1 · Definir topics</text>
  <text x="95" y="116" text-anchor="middle" font-size="6.8" fill="#37474f">subdirs wiki/&lt;topic&gt;/</text>
  <text x="95" y="130" text-anchor="middle" font-size="6.8" fill="#37474f">(1 nivel)</text>
  <text x="95" y="148" text-anchor="middle" font-size="6.8" fill="#37474f">1 tag por topic</text>
  <text x="95" y="180" text-anchor="middle" font-size="6.3" font-style="italic" fill="#90a4ae">prep (humano)</text>

  <!-- Paso 2 · Bootstrap (vault-builder) -->
  <rect x="178" y="72" width="134" height="118" rx="9" fill="#fffde7" stroke="#f9a825" stroke-width="1.6" filter="url(#shadow)"/>
  <rect x="178" y="72" width="134" height="24" rx="9" fill="#f57f17"/>
  <rect x="178" y="84" width="134" height="12" fill="#f57f17"/>
  <text x="245" y="89" text-anchor="middle" font-size="8" font-weight="700" fill="white">2 · Bootstrap</text>
  <text x="245" y="116" text-anchor="middle" font-size="6.8" fill="#5d4037">scaffolding vault/</text>
  <text x="245" y="130" text-anchor="middle" font-size="6.8" fill="#5d4037">+ .obsidian/</text>
  <text x="245" y="148" text-anchor="middle" font-size="6.8" fill="#5d4037">perfil plugins · layout</text>
  <text x="245" y="180" text-anchor="middle" font-size="6.3" font-style="italic" fill="#bf6000">obsidian-vault-builder</text>

  <!-- Paso 3 · Reunir corpus (prep) -->
  <rect x="328" y="72" width="134" height="118" rx="9" fill="#eceff1" stroke="#90a4ae" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="328" y="72" width="134" height="24" rx="9" fill="#546e7a"/>
  <rect x="328" y="84" width="134" height="12" fill="#546e7a"/>
  <text x="395" y="89" text-anchor="middle" font-size="8" font-weight="700" fill="white">3 · Reunir corpus</text>
  <text x="395" y="116" text-anchor="middle" font-size="6.8" fill="#37474f">originales del dominio</text>
  <text x="395" y="130" text-anchor="middle" font-size="6.8" fill="#37474f">PDF · DOCX · web</text>
  <text x="395" y="148" text-anchor="middle" font-size="7" font-weight="700" fill="#c62828">🔒 inmutable</text>
  <text x="395" y="180" text-anchor="middle" font-size="6.3" font-style="italic" fill="#90a4ae">prep (humano)</text>

  <!-- Paso 4 · Ingesta iterativa (karpathy) -->
  <rect x="478" y="72" width="134" height="118" rx="9" fill="#fffde7" stroke="#f9a825" stroke-width="1.6" filter="url(#shadow)"/>
  <rect x="478" y="72" width="134" height="24" rx="9" fill="#f57f17"/>
  <rect x="478" y="84" width="134" height="12" fill="#f57f17"/>
  <text x="545" y="89" text-anchor="middle" font-size="8" font-weight="700" fill="white">4 · Ingesta  ↻</text>
  <text x="545" y="116" text-anchor="middle" font-size="6.8" fill="#5d4037">Fetch → raw/ (extrae)</text>
  <text x="545" y="130" text-anchor="middle" font-size="6.8" fill="#5d4037">Compile → wiki/</text>
  <text x="545" y="148" text-anchor="middle" font-size="6.8" fill="#5d4037">1 pasada por fuente</text>
  <text x="545" y="180" text-anchor="middle" font-size="6.3" font-style="italic" fill="#bf6000">karpathy-llm-wiki</text>

  <!-- Paso 5 · Tag + color (graph-colors) -->
  <rect x="628" y="72" width="134" height="118" rx="9" fill="#fffde7" stroke="#f9a825" stroke-width="1.6" filter="url(#shadow)"/>
  <rect x="628" y="72" width="134" height="24" rx="9" fill="#f57f17"/>
  <rect x="628" y="84" width="134" height="12" fill="#f57f17"/>
  <text x="695" y="89" text-anchor="middle" font-size="8" font-weight="700" fill="white">5 · Tag + color</text>
  <text x="695" y="116" text-anchor="middle" font-size="6.8" fill="#5d4037">tags por topic →</text>
  <text x="695" y="130" text-anchor="middle" font-size="6.8" fill="#5d4037">colorGroups graph.json</text>
  <text x="695" y="148" text-anchor="middle" font-size="6.5" fill="#c62828">⚠ Obsidian cerrado</text>
  <text x="695" y="180" text-anchor="middle" font-size="6.3" font-style="italic" fill="#bf6000">obsidian-graph-colors</text>

  <!-- Paso 6 · Consumir (puerta humana difusa) -->
  <rect x="778" y="72" width="134" height="118" rx="9" fill="#fff8e1" stroke="#ffb300" stroke-width="1.8" filter="url(#shadow)"/>
  <rect x="778" y="72" width="134" height="24" rx="9" fill="#ef6c00"/>
  <rect x="778" y="84" width="134" height="12" fill="#ef6c00"/>
  <text x="845" y="89" text-anchor="middle" font-size="8" font-weight="700" fill="white">6 · Consumir 👤</text>
  <text x="845" y="116" text-anchor="middle" font-size="6.8" fill="#5d4037">Query (sintetiza/cita)</text>
  <text x="845" y="130" text-anchor="middle" font-size="6.8" fill="#5d4037">Lint (calidad)</text>
  <text x="845" y="148" text-anchor="middle" font-size="6.5" fill="#e65100">preguntas → qué ingestar</text>
  <text x="845" y="180" text-anchor="middle" font-size="6.3" font-style="italic" fill="#bf6000">karpathy + humano</text>

  <!-- arrows -->
  <line x1="162" y1="131" x2="176" y2="131" stroke="#78909c" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="312" y1="131" x2="326" y2="131" stroke="#78909c" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="462" y1="131" x2="476" y2="131" stroke="#78909c" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="612" y1="131" x2="626" y2="131" stroke="#78909c" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="762" y1="131" x2="776" y2="131" stroke="#78909c" stroke-width="2" marker-end="url(#arr)"/>

  <!-- loop hint 6 → 4 -->
  <path d="M 845 190 L 845 210 L 545 210 L 545 192" fill="none" stroke="#ffb300" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#arr)"/>
  <text x="695" y="224" text-anchor="middle" font-size="6.5" font-style="italic" fill="#e65100">las lagunas de la consulta realimentan la ingesta (bucle)</text>

  <!-- footer -->
  <text x="470" y="250" text-anchor="middle" font-size="7.5" font-weight="600" fill="#37474f">Entregable: vault Obsidian navegable, reutilizable en cualquier dominio (curso · investigación · producto · interés personal)</text>
  <text x="470" y="265" text-anchor="middle" font-size="7" font-style="italic" fill="#90a4ae">«El LLM escribe y mantiene el wiki; el humano lee y pregunta» — ninguno de los 6 pasos depende del dominio concreto.</text>
</svg>
