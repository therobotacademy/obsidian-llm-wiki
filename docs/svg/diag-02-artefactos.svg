<svg width="800" height="372" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,'Segoe UI',sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#78909c"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#00000018"/>
    </filter>
  </defs>

  <rect width="800" height="372" rx="10" fill="#f1f3f4"/>
  <rect width="800" height="30" rx="10" fill="#263238"/>
  <rect y="20" width="800" height="10" fill="#263238"/>
  <text x="400" y="19" text-anchor="middle" font-size="11" font-weight="700" fill="white">Arquitectura de artefactos — Generador de Wikis (Obsidian + LLM)</text>

  <!-- Capa 1 · Fuentes originales -->
  <rect x="16" y="44" width="768" height="62" rx="8" fill="#eceff1" stroke="#90a4ae" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="16" y="44" width="170" height="62" rx="8" fill="#546e7a"/>
  <rect x="170" y="44" width="16" height="62" fill="#546e7a"/>
  <text x="101" y="68" text-anchor="middle" font-size="9" font-weight="700" fill="white">FUENTES orig.</text>
  <text x="101" y="83" text-anchor="middle" font-size="7" fill="#cfd8dc">propietario: —</text>
  <text x="101" y="97" text-anchor="middle" font-size="7.5" font-weight="700" fill="#ffe082">🔒 inmutable</text>
  <text x="202" y="68" font-size="7.5" fill="#37474f">corpus original del dominio — PDF · DOCX · slides · capturas web · notas (donde el usuario los guarde)</text>
  <text x="202" y="86" font-size="7" font-style="italic" fill="#90a4ae">se leen, nunca se modifican · read-only</text>

  <line x1="120" y1="106" x2="120" y2="118" stroke="#78909c" stroke-width="2" marker-end="url(#arr)"/>
  <text x="240" y="116" font-size="6.5" fill="#90a4ae">extractor a texto (p.ej. pdfplumber para PDF)</text>

  <!-- Capa 2 · Raw extraído -->
  <rect x="16" y="120" width="768" height="58" rx="8" fill="#e3eaf2" stroke="#7e9bbf" stroke-width="1.4" filter="url(#shadow)"/>
  <rect x="16" y="120" width="170" height="58" rx="8" fill="#5c7aa6"/>
  <rect x="170" y="120" width="16" height="58" fill="#5c7aa6"/>
  <text x="101" y="143" text-anchor="middle" font-size="9" font-weight="700" fill="white">RAW extraído</text>
  <text x="101" y="157" text-anchor="middle" font-size="7" fill="#dde6f0">karpathy crea</text>
  <text x="101" y="170" text-anchor="middle" font-size="7.5" font-weight="700" fill="#ffe082">🔒 inmutable</text>
  <text x="202" y="144" font-size="7.5" fill="#37474f">raw/&lt;topic&gt;/YYYY-MM-DD-slug.md — texto extraído + metadatos (fuente, fechas, nota de estructura)</text>
  <text x="202" y="162" font-size="7" font-style="italic" fill="#90a4ae">inmutable una vez creado · el wiki se recompone desde raw/, nunca se re-extrae el binario</text>

  <line x1="120" y1="178" x2="120" y2="190" stroke="#78909c" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="430" y1="178" x2="430" y2="190" stroke="#78909c" stroke-width="2" marker-end="url(#arr)"/>
  <text x="240" y="188" font-size="6.5" fill="#90a4ae">compile (merge / new / cross-topic)</text>

  <!-- Capa 3 · Wiki artículos -->
  <rect x="16" y="192" width="768" height="76" rx="8" fill="#fffde7" stroke="#f9a825" stroke-width="1.8" filter="url(#shadow)"/>
  <rect x="16" y="192" width="170" height="76" rx="8" fill="#f57f17"/>
  <rect x="170" y="192" width="16" height="76" fill="#f57f17"/>
  <text x="101" y="218" text-anchor="middle" font-size="9" font-weight="700" fill="white">WIKI</text>
  <text x="101" y="233" text-anchor="middle" font-size="6.8" fill="#ffe0b2">karpathy · full ownership</text>
  <text x="101" y="247" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff3e0">editable (skill)</text>
  <text x="101" y="261" text-anchor="middle" font-size="6.8" fill="#ffe0b2">«compounding artifact»</text>
  <text x="202" y="214" font-size="7.5" fill="#37474f">wiki/&lt;topic&gt;/articulo.md — frontmatter (tags) · Summary · secciones · See Also (1 nivel de subdirs)</text>
  <text x="202" y="232" font-size="7.5" font-weight="600" fill="#bf6000">wiki/index.md — índice global (1 fila/artículo)   ·   wiki/log.md — log append-only</text>
  <text x="202" y="250" font-size="7" fill="#5d4037">los tags del frontmatter son la clave que conecta el artículo con el color del grafo</text>
  <text x="202" y="263" font-size="7" font-style="italic" fill="#9e8a3a">cada Ingest actualiza SIEMPRE index.md + log.md</text>

  <line x1="120" y1="268" x2="120" y2="280" stroke="#78909c" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Capa 4 · Config Obsidian -->
  <rect x="16" y="282" width="768" height="72" rx="8" fill="#eceff1" stroke="#9fa8da" stroke-width="1.4" filter="url(#shadow)"/>
  <rect x="16" y="282" width="170" height="72" rx="8" fill="#5c6bc0"/>
  <rect x="170" y="282" width="16" height="72" fill="#5c6bc0"/>
  <text x="101" y="308" text-anchor="middle" font-size="9" font-weight="700" fill="white">CONFIG Obsidian</text>
  <text x="101" y="323" text-anchor="middle" font-size="6.8" fill="#e8eaf6">vault-builder crea</text>
  <text x="101" y="337" text-anchor="middle" font-size="6.8" fill="#e8eaf6">graph-colors edita</text>
  <text x="101" y="350" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff59d">⚠ Obsidian cerrado</text>
  <text x="202" y="304" font-size="7.5" fill="#37474f">wiki/.obsidian/ — app · appearance · core-plugins · graph.json (colorGroups por tag) · workspace</text>
  <text x="202" y="322" font-size="7" fill="#5d4037">graph.json: query tag:#topic → color RGB DECIMAL = R×65536 + G×256 + B</text>
  <text x="202" y="340" font-size="7" font-style="italic" fill="#c62828">Obsidian abierto revierte cambios externos · workspace.json NO se edita externamente</text>
</svg>
